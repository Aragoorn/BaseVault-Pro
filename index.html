<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Vault DApp</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #fff; padding: 40px; text-align: center; }
        .card { background: #1e293b; padding: 30px; border-radius: 12px; max-width: 450px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: left; }
        h2, h3 { text-align: center; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; width: 100%; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        .btn-withdraw { background: #ea580c; }
        .btn-withdraw:hover { background: #c2410c; }
        input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #475569; background: #334155; color: white; box-sizing: border-box; }
        .status { margin-top: 15px; color: #38bdf8; font-weight: bold; text-align: center; font-size: 14px; word-break: break-all; }
        .balance-box { background: #334155; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="card">
    <h2>Base Vault Dashboard</h2>
    <p style="text-align: center; color: #94a3b8;">Secure Savings Vault</p>
    <button id="connectBtn">Connect Wallet</button>
    <p id="walletAddress" class="status"></p>

    <div class="balance-box">
        <span>Your Vault Balance:</span>
        <h3 id="vaultBalance" style="margin: 5px 0; color: #10b981;">0.0 ETH</h3>
    </div>

    <hr style="border-color: #334155; margin: 20px 0;">

    <!-- عملیات واریز -->
    <h3>Deposit ETH</h3>
    <label>Amount to Deposit (in Ether):</label>
    <input type="text" id="depositAmount" placeholder="e.g., 0.0001" />
    <button id="depositBtn">Deposit to Vault</button>

    <hr style="border-color: #334155; margin: 20px 0;">

    <!-- عملیات برداشت -->
    <h3>Withdraw ETH</h3>
    <label>Amount to Withdraw (in Ether):</label>
    <input type="text" id="withdrawAmount" placeholder="e.g., 0.0001" />
    <button id="withdrawBtn" class="btn-withdraw">Withdraw from Vault</button>

    <p id="txStatus" class="status"></p>
</div>

<script>
    let account;
    // آدرس قرارداد شما با موفقیت در این بخش قرار گرفت
    const contractAddress = "0x206622d5257243E92DA410F5FBfAd62A86a295A5"; 

    const connectBtn = document.getElementById("connectBtn");
    const walletAddressP = document.getElementById("walletAddress");
    const vaultBalanceH3 = document.getElementById("vaultBalance");
    const txStatusP = document.getElementById("txStatus");

    const getProvider = () => window.ethereum || (window.rabby ? window.rabby : null);

    async function connectWallet() {
        const provider = getProvider();
        if (provider) {
            try {
                const accounts = await provider.request({ method: 'eth_requestAccounts' });
                account = accounts[0];
                walletAddressP.innerText = `Connected: ${account.substring(0,6)}...${account.substring(38)}`;
                connectBtn.innerText = "Wallet Connected";
                txStatusP.innerText = "";
                await updateBalance();
            } catch (error) {
                txStatusP.innerText = "Connection rejected.";
            }
        } else {
            alert("Please unlock Rabby and refresh!");
        }
    }

    async function updateBalance() {
        const provider = getProvider();
        if (!account || !provider) return;
        try {
            const cleanAddress = account.toLowerCase().replace("0x", "").padStart(64, '0');
            const data = "0x77e0b5d8" + cleanAddress; 
            
            const response = await provider.request({
                method: 'eth_call',
                params: [{ to: contractAddress, data: data }, 'latest']
            });
            
            const weiBalance = BigInt(response);
            const ethBalance = Number(weiBalance) / 1e18;
            vaultBalanceH3.innerText = `${ethBalance.toFixed(5)} ETH`;
        } catch (error) {
            console.error("Failed to fetch balance:", error);
        }
    }

    // 1. عملیات واریز (Deposit)
    document.getElementById("depositBtn").addEventListener("click", async () => {
        const provider = getProvider();
        const amount = document.getElementById("depositAmount").value;
        if (!amount || !account || !provider) { alert("Connect wallet and enter amount"); return; }
        
        const hexValue = "0x" + (parseFloat(amount) * 1e18).toString(16);
        const data = "0xd0e30db0"; 

        try {
            txStatusP.innerText = "Sending deposit transaction...";
            const txHash = await provider.request({
                method: 'eth_sendTransaction',
                params: [{ from: account, to: contractAddress, data: data, value: hexValue }],
            });
            txStatusP.innerText = `Deposit Sent! Hash: ${txHash.substring(0,15)}...`;
            setTimeout(updateBalance, 5000);
        } catch (error) {
            txStatusP.innerText = "Deposit failed.";
        }
    });

    // 2. عملیات برداشت (Withdraw)
    document.getElementById("withdrawBtn").addEventListener("click", async () => {
        const provider = getProvider();
        const amount = document.getElementById("withdrawAmount").value;
        if (!amount || !account || !provider) { alert("Connect wallet and enter amount"); return; }
        
        const hexAmount = (parseFloat(amount) * 1e18).toString(16).padStart(64, '0');
        const data = "0x2e1a7d4d" + hexAmount; 

        try {
            txStatusP.innerText = "Sending withdraw transaction...";
            const txHash = await provider.request({
                method: 'eth_sendTransaction',
                params: [{ from: account, to: contractAddress, data: data, value: '0x0' }],
            });
            txStatusP.innerText = `Withdraw Sent! Hash: ${txHash.substring(0,15)}...`;
            setTimeout(updateBalance, 5000);
        } catch (error) {
            txStatusP.innerText = "Withdraw failed.";
        }
    });

    connectBtn.addEventListener("click", connectWallet);
</script>

</body>
</html>
