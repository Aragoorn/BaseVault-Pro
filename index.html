<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Vault DApp</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #fff; padding: 40px; text-align: center; }
        .card { background: #1e293b; padding: 30px; border-radius: 12px; max-width: 450px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: left; }
        h2, h3 { text-align: center; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 15px; width: 100%; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        .btn-withdraw { background: #ea580c; }
        .btn-withdraw:hover { background: #c2410c; }
        input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #475569; background: #334155; color: white; box-sizing: border-box; }
        .status { margin-top: 15px; color: #38bdf8; font-weight: bold; text-align: center; font-size: 14px; word-break: break-all; }
        .balance-box { background: #334155; padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center; }
        label { font-weight: bold; display: block; margin-top: 15px; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="card">
    <h2>Base Vault Dashboard</h2>
    <p style="text-align: center; color: #94a3b8;">Secure Savings Vault</p>
    <button id="connectBtn">Connect Wallet</button>
    <p id="walletAddress" class="status"></p>

    <div class="balance-box">
        <span>Your Vault Balance:</span>
        <h3 id="vaultBalance" style="margin: 5px 0; color: #10b981;">0.0 ETH</h3>
    </div>

    <hr style="border-color: #334155; margin: 20px 0;">

    <!-- عملیات واریز -->
    <h3>Deposit ETH</h3>
    <label>Amount to Deposit (in Ether):</label>
    <input type="text" id="depositAmount" placeholder="e.g., 0.0001" />
    <button id="depositBtn">Deposit to Vault</button>

    <hr style="border-color: #334155; margin: 20px 0;">

    <!-- عملیات برداشت -->
    <h3>Withdraw ETH</h3>
    <label>Amount to Withdraw (in Ether):</label>
    <input type="text" id="withdrawAmount" placeholder="e.g., 0.0001" />
    <button id="withdrawBtn" class="btn-withdraw">Withdraw from Vault</button>

    <p id="txStatus" class="status"></p>
</div>

<!-- متصل کردن منطق جاوااسکریپت از فایل خارجی -->
<script src="app.js"></script>

</body>
</html>
